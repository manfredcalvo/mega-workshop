bundle:
  name: megacable-solutions
resources:
  experiments:
    megacable_rag_experiment:
      name: /Users/${workspace.current_user.userName}/megacable-rag-agent-${var.resource_name_suffix}
  apps:
    databricks_chatbot:
      description: Megacable Enterprise Solutions Chat Bot
      name: megacable-solutions
      resources:
      - name: postgres
        postgres:
          branch: projects/megacable-ka-db-${var.resource_name_suffix}/branches/production
          database: projects/megacable-ka-db-${var.resource_name_suffix}/branches/production/databases/${var.lakebase_database_id}
          permission: CAN_CONNECT_AND_CREATE
      - name: experiment
        experiment:
          experiment_id: ${resources.experiments.megacable_rag_experiment.experiment_id}
          permission: CAN_EDIT
      source_code_path: .
  jobs:
    create_and_deploy_model:
      environments:
      - environment_key: default
        spec:
          client: '1'
      name: create-and-deploy-model-${var.resource_name_suffix}
      tasks:
      - environment_key: default
        notebook_task:
          base_parameters:
            uc_catalog: ${var.uc_catalog}
            uc_schema: ${var.uc_schema}
            uc_volume: ${var.uc_volume}
          notebook_path: ./notebooks/data_processing/scraper_solutions.py
          source: WORKSPACE
        task_key: scrape_solutions
      - environment_key: default
        notebook_task:
          base_parameters:
            uc_catalog: ${var.uc_catalog}
            uc_schema: ${var.uc_schema}
            uc_volume: ${var.uc_volume}
          notebook_path: ./notebooks/data_processing/translate_knowledge_base.py
          source: WORKSPACE
        task_key: translate_knowledge_base
      - depends_on:
        - task_key: scrape_solutions
        - task_key: translate_knowledge_base
        environment_key: default
        notebook_task:
          base_parameters:
            experiment_id: ${resources.experiments.megacable_rag_experiment.experiment_id}
            resource_name_suffix: ${var.resource_name_suffix}
            sample_ratio: ${var.sample_ratio}
            uc_catalog: ${var.uc_catalog}
            uc_schema: ${var.uc_schema}
            uc_volume: ${var.uc_volume}
          notebook_path: ./notebooks/model/create_vs_indexes.py
          source: WORKSPACE
        task_key: create_vs_indexes
      - depends_on:
        - task_key: create_vs_indexes
        environment_key: default
        notebook_task:
          base_parameters:
            experiment_id: ${resources.experiments.megacable_rag_experiment.experiment_id}
            uc_catalog: ${var.uc_catalog}
            uc_schema: ${var.uc_schema}
            lakebase_project_id: megacable-ka-db-${var.resource_name_suffix}
          notebook_path: ./notebooks/evaluations/model_evaluation.py
          source: WORKSPACE
        task_key: model_evaluation
      - depends_on:
        - task_key: model_evaluation
        environment_key: default
        notebook_task:
          base_parameters:
            experiment_id: ${resources.experiments.megacable_rag_experiment.experiment_id}
          notebook_path: ./notebooks/monitoring/model_monitoring.py
          source: WORKSPACE
        task_key: model_monitoring
targets:
  dev:
    default: true
    mode: development
    variables:
      resource_name_suffix: dev-${workspace.current_user.domain_friendly_name}
  prod:
    mode: production
    variables:
      resource_name_suffix: prod
  staging:
    mode: production
    variables:
      resource_name_suffix: staging
variables:
  experiment_id:
    default: ''
    description: MLflow experiment ID for collecting user feedback
  lakebase_database_id:
    default: db-csde-110d7m7jz7
    description: 'Lakebase database ID — retrieved after first deploy via: databricks
      postgres list-databases projects/megacable-ka-db-<suffix>/branches/production
      --output json | jq -r ''.[0].name'''
  resource_name_suffix:
    description: Suffix for resource names (app/lakebase instance names etc). Helpful
      for avoiding name collisions if multiple users deploy this app to the same workspace
  uc_catalog:
    default: workshop_andrea
    description: Unity Catalog catalog name for storing scraper output
  uc_schema:
    default: megacable
    description: Unity Catalog schema name for storing scraper output
  uc_volume:
    default: megacable-unstructured
    description: Unity Catalog volume name for storing scraper output
  sample_ratio:
    default: '1.0'
    description: Fraction of KB docs to index (1.0 = all docs, 0.1 = 10%). Lower values speed up index creation.
