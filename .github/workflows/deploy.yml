name: Deploy Megacable Solutions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  TARGET: ${{ github.event.inputs.target || 'dev' }}

jobs:
  build-app:
    name: Build & Lint App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm run build:client

      - name: Build server
        run: npm run build:server

  deploy-bundle:
    name: Deploy Bundle
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Replace valueFrom entries in app.yaml for initial deploy
        run: |
          pip install pyyaml -q
          python3 - <<'EOF'
          import yaml

          # Replace all valueFrom references with empty values so the initial
          # deploy does not fail trying to resolve resources that don't exist yet.
          with open("app.yaml") as f:
              app = yaml.safe_load(f)

          for var in app.get("env", []):
              if "valueFrom" in var:
                  var["value"] = ""
                  del var["valueFrom"]

          with open("app.yaml", "w") as f:
              yaml.dump(app, f, default_flow_style=False, allow_unicode=True)

          print("Replaced valueFrom entries for initial deploy")
          EOF

      - name: Validate bundle
        run: databricks bundle validate -t ${{ env.TARGET }}

      - name: Deploy bundle
        run: databricks bundle deploy -t ${{ env.TARGET }}

  scrape-and-create-ka:
    name: Scrape Data, Translate KB & Create KA
    needs: deploy-bundle
    runs-on: ubuntu-latest
    outputs:
      endpoint_name: ${{ steps.extract.outputs.endpoint_name }}
      experiment_id: ${{ steps.extract.outputs.experiment_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Get UC volume coordinates from bundle summary
        id: get_uc
        run: |
          SUMMARY=$(databricks bundle summary -t ${{ env.TARGET }} --output json)
          UC_CATALOG=$(echo "$SUMMARY" | jq -r '.variables.uc_catalog.value')
          UC_SCHEMA=$(echo "$SUMMARY"  | jq -r '.variables.uc_schema.value')
          UC_VOLUME=$(echo "$SUMMARY"  | jq -r '.variables.uc_volume.value')
          echo "uc_catalog=$UC_CATALOG" >> "$GITHUB_OUTPUT"
          echo "uc_schema=$UC_SCHEMA"   >> "$GITHUB_OUTPUT"
          echo "uc_volume=$UC_VOLUME"   >> "$GITHUB_OUTPUT"
          echo "UC path: /Volumes/$UC_CATALOG/$UC_SCHEMA/$UC_VOLUME"

      - name: Upload knowledge_base_md to UC volume
        run: |
          databricks fs cp -r ./knowledge_base_md/ \
            "dbfs:/Volumes/${{ steps.get_uc.outputs.uc_catalog }}/${{ steps.get_uc.outputs.uc_schema }}/${{ steps.get_uc.outputs.uc_volume }}/knowledge_base_md/" \
            --overwrite
          echo "knowledge_base_md uploaded to volume."

      - name: Run scrapers, translate KB and create KA
        id: run_job
        run: |
          databricks bundle run create_and_deploy_model -t ${{ env.TARGET }} --output json > job_output.json
          cat job_output.json

      - name: Extract KA endpoint and experiment ID
        id: extract
        run: |
          KA_OUTPUT=$(jq -r '.task_outputs[] | select(.TaskKey == "create_ka") | .Output.result' job_output.json)
          ENDPOINT_NAME=$(echo "$KA_OUTPUT" | jq -r '.endpoint_name')
          EXPERIMENT_ID=$(echo "$KA_OUTPUT" | jq -r '.experiment_id')
          echo "endpoint_name=$ENDPOINT_NAME" >> "$GITHUB_OUTPUT"
          echo "experiment_id=$EXPERIMENT_ID" >> "$GITHUB_OUTPUT"
          echo "KA Endpoint: $ENDPOINT_NAME"
          echo "Experiment ID: $EXPERIMENT_ID"

  setup-db-and-redeploy:
    name: Setup DB Role & Redeploy with All Config
    needs: [scrape-and-create-ka]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install "databricks-sdk>=0.81.0" "psycopg[binary]>=3.0" pyyaml

      - name: Get Lakebase project ID and database ID
        id: get_db
        run: |
          PROJECT_ID=$(databricks bundle summary -t ${{ env.TARGET }} --output json | jq -r '.resources.postgres_projects.chatbot_lakebase.project_id')
          DB_ID=$(databricks postgres list-databases "projects/$PROJECT_ID/branches/production" --output json | jq -r '.[0].name')
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"
          echo "Project ID: $PROJECT_ID"
          echo "Database ID: $DB_ID"

      - name: Get app service principal client ID
        id: get_sp
        run: |
          SP_CLIENT_ID=$(databricks apps get megacable-solutions --output json | jq -r '.service_principal_client_id')
          echo "sp_client_id=$SP_CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "Service Principal: $SP_CLIENT_ID"

      - name: Run Lakebase role setup
        run: |
          python3 scripts/lakebase-role-setup.py \
            --project-id ${{ steps.get_db.outputs.project_id }} \
            --sp-client-id ${{ steps.get_sp.outputs.sp_client_id }}

      - name: Inject KA endpoint, experiment ID and Lakebase DB ID into databricks.yml
        run: |
          python3 - <<'EOF'
          import yaml

          endpoint_name = "${{ needs.scrape-and-create-ka.outputs.endpoint_name }}"
          experiment_id = "${{ needs.scrape-and-create-ka.outputs.experiment_id }}"
          db_id         = "${{ steps.get_db.outputs.db_id }}"

          with open("databricks.yml") as f:
              config = yaml.safe_load(f)

          # Set the lakebase database ID variable
          config["variables"]["lakebase_database_id"]["default"] = db_id

          # Add serving-endpoint and experiment app resources
          # (postgres resource is already declared statically in databricks.yml)
          existing = config["resources"]["apps"]["databricks_chatbot"].get("resources", [])
          non_ka = [r for r in existing if r["name"] not in ("serving-endpoint", "experiment")]
          config["resources"]["apps"]["databricks_chatbot"]["resources"] = non_ka + [
              {
                  "name": "serving-endpoint",
                  "description": "Databricks serving endpoint name for the AI agent",
                  "serving_endpoint": {
                      "name": endpoint_name,
                      "permission": "CAN_QUERY",
                  },
              },
              {
                  "name": "experiment",
                  "description": "MLflow experiment for collecting user feedback",
                  "experiment": {
                      "experiment_id": experiment_id,
                      "permission": "CAN_EDIT",
                  },
              },
          ]

          with open("databricks.yml", "w") as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True)

          print(f"databricks.yml updated — db_id={db_id}, endpoint={endpoint_name}, experiment={experiment_id}")
          EOF

      - name: Redeploy bundle with full config
        run: databricks bundle deploy -t ${{ env.TARGET }}

  start-app:
    name: Start App
    needs: setup-db-and-redeploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Start the app
        run: databricks bundle run databricks_chatbot -t ${{ env.TARGET }}
