name: Deploy Megacable Solutions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  TARGET: ${{ github.event.inputs.target || 'dev' }}

jobs:
  build-app:
    name: Build & Lint App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm run build:client

      - name: Build server
        run: npm run build:server

  deploy-bundle:
    name: Deploy Bundle
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Strip phase-1 blockers from app.yaml and databricks.yml
        run: |
          pip install pyyaml -q
          python3 - <<'EOF'
          import yaml

          # app.yaml: replace valueFrom references with empty values so the
          # initial deploy does not fail trying to resolve resources that
          # don't exist yet.
          with open("app.yaml") as f:
              app = yaml.safe_load(f)

          for var in app.get("env", []):
              if "valueFrom" in var:
                  var["value"] = ""
                  del var["valueFrom"]

          with open("app.yaml", "w") as f:
              yaml.dump(app, f, default_flow_style=False, allow_unicode=True)

          print("app.yaml: replaced valueFrom entries")

          # databricks.yml: strip the database: field from the app's postgres
          # resource binding — the database doesn't exist yet on a fresh deploy.
          with open("databricks.yml") as f:
              config = yaml.safe_load(f)

          app_resources = config.get("resources", {}).get("apps", {}) \
              .get("databricks_chatbot", {}).get("resources", [])
          for res in app_resources:
              if res.get("name") == "postgres" and "postgres" in res:
                  res["postgres"].pop("database", None)

          with open("databricks.yml", "w") as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True)

          print("databricks.yml: stripped postgres database binding for phase-1 deploy")
          EOF

      - name: Validate bundle
        run: databricks bundle validate -t ${{ env.TARGET }}

      - name: Deploy bundle
        run: databricks bundle deploy -t ${{ env.TARGET }}

  scrape-and-deploy-model:
    name: Scrape Data, Translate KB & Deploy Model
    needs: deploy-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Get UC volume coordinates from bundle summary
        id: get_uc
        run: |
          SUMMARY=$(databricks bundle summary -t ${{ env.TARGET }} --output json)
          UC_CATALOG=$(echo "$SUMMARY" | jq -r '.variables.uc_catalog.value')
          UC_SCHEMA=$(echo "$SUMMARY"  | jq -r '.variables.uc_schema.value')
          UC_VOLUME=$(echo "$SUMMARY"  | jq -r '.variables.uc_volume.value')
          echo "uc_catalog=$UC_CATALOG" >> "$GITHUB_OUTPUT"
          echo "uc_schema=$UC_SCHEMA"   >> "$GITHUB_OUTPUT"
          echo "uc_volume=$UC_VOLUME"   >> "$GITHUB_OUTPUT"
          echo "UC path: /Volumes/$UC_CATALOG/$UC_SCHEMA/$UC_VOLUME"

      - name: Upload knowledge_base_md to UC volume
        run: |
          databricks fs cp -r ./knowledge_base_md/ \
            "dbfs:/Volumes/${{ steps.get_uc.outputs.uc_catalog }}/${{ steps.get_uc.outputs.uc_schema }}/${{ steps.get_uc.outputs.uc_volume }}/knowledge_base_md/" \
            --overwrite
          echo "knowledge_base_md uploaded to volume."

      - name: Run scrape, translate, pgvector ingest, evaluate and monitor
        run: |
          databricks bundle run create_and_deploy_model -t ${{ env.TARGET }}

  setup-db-and-redeploy:
    name: Setup DB Role & Redeploy with All Config
    needs: [scrape-and-deploy-model]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install "databricks-sdk>=0.81.0" "psycopg[binary]>=3.0" pyyaml

      - name: Create Lakebase project and get database ID
        id: get_db
        run: |
          SUFFIX=$(databricks bundle summary -t ${{ env.TARGET }} --output json \
            | jq -r '.variables.resource_name_suffix.value')
          PROJECT_ID="megacable-ka-db-$SUFFIX"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "Project ID: $PROJECT_ID"

          # Create the project if it doesn't already exist
          databricks postgres create-project "$PROJECT_ID" 2>&1 \
            | grep -v "already exists" || true

          # Poll until the production branch has a database
          echo "Waiting for Lakebase database to be ready..."
          for i in $(seq 1 30); do
            DB_ID=$(databricks postgres list-databases \
              "projects/$PROJECT_ID/branches/production" \
              --output json 2>/dev/null | jq -r '.[0].name // empty')
            if [ -n "$DB_ID" ]; then
              echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"
              echo "Database ready: $DB_ID"
              break
            fi
            echo "  attempt $i/30 — not ready yet, waiting 10s..."
            sleep 10
          done
          if [ -z "$DB_ID" ]; then
            echo "ERROR: Lakebase database did not become ready in time"
            exit 1
          fi

      - name: Get app service principal client ID
        id: get_sp
        run: |
          SP_CLIENT_ID=$(databricks apps get megacable-solutions --output json \
            | jq -r '.service_principal_client_id')
          echo "sp_client_id=$SP_CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "Service Principal: $SP_CLIENT_ID"

      - name: Run Lakebase role setup
        run: |
          python3 scripts/lakebase-role-setup.py \
            --project-id ${{ steps.get_db.outputs.project_id }} \
            --sp-client-id ${{ steps.get_sp.outputs.sp_client_id }}

      - name: Inject Lakebase DB ID and restore postgres app binding
        run: |
          python3 - <<'EOF'
          import yaml

          db_id      = "${{ steps.get_db.outputs.db_id }}"
          project_id = "${{ steps.get_db.outputs.project_id }}"

          with open("databricks.yml") as f:
              config = yaml.safe_load(f)

          # Update the lakebase_database_id variable
          config["variables"]["lakebase_database_id"]["default"] = db_id

          # Restore the database binding on the app's postgres resource
          # (it was stripped for the phase-1 deploy)
          suffix_var = "${var.resource_name_suffix}"
          db_path = (
              f"projects/megacable-ka-db-{suffix_var}/branches/production"
              f"/databases/${{var.lakebase_database_id}}"
          )
          app_resources = (
              config.get("resources", {})
              .get("apps", {})
              .get("databricks_chatbot", {})
              .get("resources", [])
          )
          for res in app_resources:
              if res.get("name") == "postgres" and "postgres" in res:
                  res["postgres"]["database"] = db_path

          with open("databricks.yml", "w") as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True)

          print(f"databricks.yml updated — lakebase_database_id={db_id}")
          EOF

      - name: Redeploy bundle with full config
        run: databricks bundle deploy -t ${{ env.TARGET }}

  start-app:
    name: Start App
    needs: setup-db-and-redeploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Start the app
        run: databricks bundle run databricks_chatbot -t ${{ env.TARGET }}
